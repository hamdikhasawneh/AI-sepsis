services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sepsis_user
      POSTGRES_PASSWORD: sepsis_pass
      POSTGRES_DB: sepsis_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepsis_user -d sepsis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sepsis_user:sepsis_pass@db:5432/sepsis_db
      JWT_SECRET_KEY: dev-secret-key-change-in-production-xyz123
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - uploads_data:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
